<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <title>Thesis Register</title>
    </head>
    <body>
        <form action="register_process.php" method="POST">
        <div class="lableRegister">
            <h1>Register</h1>
            <p>สมัครสมาชิก</p>
        </div>

        <div class="InputUsers">
            <br><input type="text" name="username" placeholder="Username">
        </div>
        <div class="InputPassword">
            <br><input type="password" name="password" placeholder="Password">
        </div>

        <div class="InputConfirmPassword">
            <br><input type="password" name="InputConfirm" placeholder="Confirm Password">
        </div>

        <div class="StudentID">
            <br><input type="text" name="studentID" placeholder="Student ID">
        </div>

        <div class=name>
            <br><input type="text" name="firstname" placeholder="First name">
            <input type="text" name="lastname" placeholder="last name">
        </div>
        
        <div class="RegisEmail">
            <br><input type="email" name="email" placeholder="Email">
        </div>
        <div class="btRegister">
            <br><button type="submit">สมัครสมาชิก</button>
        </div>
        </form>
    </body>
</html>
